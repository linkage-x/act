# 光照数据增强配置
# 用于提高ACT模型对光照变化的鲁棒性

lighting_augmentation:
  # 是否启用光照增强 (设为false可快速禁用)
  enabled: false

  # 颜色抖动参数 (取值范围 0-1)
  brightness: 0.3    # 亮度变化范围 ±30%
  contrast: 0.2      # 对比度变化范围 ±20%
  saturation: 0.2    # 饱和度变化范围 ±20%
  hue: 0.1          # 色调变化范围 ±10%

  # 自适应光照标准化
  adaptive_normalization: true
  target_mean: 0.5   # 目标亮度均值 (0-1)

# 注意事项:
# 1. 增强只会应用到训练集，验证集保持原始
# 2. 如果发现训练损失上升，可以降低增强强度
# 3. 建议从较小的参数开始，逐步调优